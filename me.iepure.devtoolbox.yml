app-id: me.iepure.devtoolbox
runtime: org.gnome.Platform
runtime-version: "master"
sdk: org.gnome.Sdk
command: devtoolbox
finish-args:
    - --share=network
    - --share=ipc
    - --socket=fallback-x11
    - --socket=wayland
cleanup:
    - "/include"
    - "/lib/pkgconfig"
    - "/man"
    - "/share/doc"
    - "/share/gtk-doc"
    - "/share/man"
    - "/share/pkgconfig"
    - "*.la"
    - "*.a"
build-options:
    build-args:
    - --share=network
modules:
    - name: devtoolbox
      builddir: true
      buildsystem: meson
      sources:
          - type: git
            branch: main
            url: file:///home/ale/Dev/devtoolbox
